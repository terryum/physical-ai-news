name: Crawl Sources

on:
  schedule:
    # 매일 한국시간 오전 7시 (UTC 22시)
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: crawl-sources
  cancel-in-progress: false

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 25
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run fast crawl (Groups A-D)
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          BIZINFO_API_KEY: ${{ secrets.BIZINFO_API_KEY }}
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          ANTHROPIC_TRANSLATE_MODEL: ${{ secrets.ANTHROPIC_TRANSLATE_MODEL }}
        run: npx tsx scripts/crawl-fast.ts

      - name: Commit and push crawled data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/items.json
          git diff --staged --quiet || git commit -m "data: daily crawl $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push

      - name: Build static site
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        run: |
          DEPLOY_SHA="$(git rev-parse HEAD)"
          npx wrangler@latest pages deploy out --project-name=physical-ai-news --branch=main --commit-dirty=true --commit-hash="$DEPLOY_SHA" --commit-message="$DEPLOY_SHA"
