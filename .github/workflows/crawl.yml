name: Crawl Sources

on:
  schedule:
    # 매일 한국시간 오전 7시 (UTC 22시)
    - cron: '0 22 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  crawl:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Run fast crawl (Groups A-D)
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
          BIZINFO_API_KEY: ${{ secrets.BIZINFO_API_KEY }}
          BIZROUTER_BASE_URL: ${{ secrets.BIZROUTER_BASE_URL }}
          BIZROUTER_API_KEY: ${{ secrets.BIZROUTER_API_KEY }}
          BIZROUTER_TRANSLATE_MODEL: ${{ secrets.BIZROUTER_TRANSLATE_MODEL }}
        run: npx tsx scripts/crawl-fast.ts

      - name: Commit and push crawled data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add public/data/items.json
          git diff --staged --quiet || git commit -m "data: daily crawl $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          git push
