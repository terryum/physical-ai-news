name: Deploy to Cloudflare Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - run: npm ci

      - name: Build
        run: npm run build

      - name: Deploy to Cloudflare Pages
        env:
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
        # --commit-message 을 SHA 로 명시: wrangler 가 git log 에서 한국어 커밋 메시지를
        # 자동 추출할 때 일부 byte 가 Cloudflare API UTF-8 검증을 통과 못 하는 이슈 우회.
        run: npx wrangler@latest pages deploy out --project-name=physical-ai-news --branch=main --commit-dirty=true --commit-hash=${{ github.sha }} --commit-message=${{ github.sha }}
