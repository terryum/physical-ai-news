name: Daily Digest (Substack)

on:
  # Scheduled cron runs from Oracle Cloud Seoul VM (KR IP required to pass
  # Cloudflare in front of Substack). Manual dispatch is kept for ad-hoc runs
  # via SUBSTACK_COOKIE + HTTPS_PROXY secrets.
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-substack:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
      - run: npm ci
      - name: Publish daily digest to Substack
        env:
          SUBSTACK_COOKIE: ${{ secrets.SUBSTACK_COOKIE }}
          NEXT_PUBLIC_SUBSTACK_URL: ${{ vars.NEXT_PUBLIC_SUBSTACK_URL }}
          HTTPS_PROXY: ${{ secrets.HTTPS_PROXY }}
        run: npx tsx scripts/send-digest.ts
      - name: Save sent history for dedup
        run: |
          if git diff --quiet public/data/digest-sent.json 2>/dev/null; then
            echo "No changes to digest-sent.json"
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git add public/data/digest-sent.json
            git commit -m "data: update digest sent history"
            git push
          fi
